# Your Name Theme (Kimi no Na wa)

# ===== MONITOR =====
monitor=,preferred,auto,1

# ===== AUTOSTART =====
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = dunst
exec-once = awww-daemon
exec-once = awww img ~/Pictures/Wallpapers/wallpaper.jpg --transition-type wipe --transition-fps 60
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = gnome-keyring-daemon --start --components=secrets

# ===== ENVIRONMENT VARIABLES =====
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ===== LOOK AND FEEL =====
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(5bbfcfff) rgba(a78be0ff) 45deg
    col.inactive_border = rgba(0f274466)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
        vibrancy = 0.2
        vibrancy_darkness = 0.5
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(5bbfcf66)
        color_inactive = rgba(050a1466)
    }
}

animations {
    enabled = true

    bezier = dragon, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.4, 0, 0.2, 1
    bezier = overshot, 0.7, 0.3, 0.2, 1.3
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 5, dragon, slide
    animation = windowsOut, 1, 5, smooth, slide
    animation = windowsMove, 1, 4, smooth, slide
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 40, linear, loop
    animation = fade, 1, 5, smooth
    animation = fadeDim, 1, 5, smooth
    animation = workspaces, 1, 5, dragon, slide
    animation = specialWorkspace, 1, 5, dragon, slidefadevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = false
}

# ===== INPUT =====
input {
    kb_layout = us
#    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = 1
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
}

# ===== WINDOW RULES (MODERN SYNTAX) =====

# Float rules
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(file-roller)$, float on
windowrule = match:class ^(imv)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on

# Thunar (File Manager) configurations
windowrule = match:class ^(thunar)$, float on
windowrule = match:class ^(thunar)$, size 900 600
windowrule = match:class ^(thunar)$, center on
windowrule = match:class ^(thunar)$, opacity 0.95

# Terminal opacity
windowrule = match:class ^(kitty)$, opacity 0.9

# Hypremoji
windowrule = match:title ^(HyprEmoji)$, float on
windowrule = match:title ^(HyprEmoji)$, move onscreen cursor -50% -5%

# ===== LAYER RULES =====
layerrule = blur on, match:namespace rofi
# layerrule = ignorezero on, match:namespace rofi
# layerrule = blur on, match:namespace waybar

# ===== KEYBINDINGS =====
$mainMod = SUPER

# -- Application Launchers --
bind = $mainMod, Return, exec, kitty
bind = $mainMod, E, exec, thunar
bind = $mainMod SHIFT, Return, exec, rofi -show drun
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# -- Screenshot --
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/screenshot.sh clip

# -- Power / Session --
bind = $mainMod SHIFT, Q, exec, wlogout
bind = $mainMod, Escape, exec, hyprlock

# -- Window Management --
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# -- Focus Navigation (Vim-style) --
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# -- Arrow key navigation --
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# -- Move Windows --
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# -- Resize Windows --
binde = $mainMod ALT, h, resizeactive, -30 0
binde = $mainMod ALT, l, resizeactive, 30 0
binde = $mainMod ALT, k, resizeactive, 0 -30
binde = $mainMod ALT, j, resizeactive, 0 30

# -- Workspaces --
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -- Special Workspace (scratchpad) --
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# -- Emoji --
# bind = $mainMod, period, exec, hypremoji

# -- Scroll through workspaces --
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# -- Mouse window management --
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- Media Keys --
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
